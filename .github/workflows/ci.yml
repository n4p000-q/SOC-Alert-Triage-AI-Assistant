name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: syntax check ──────────────────────────────────
  backend:
    name: Backend (Python syntax)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check Python syntax
        run: python -m py_compile backend/flask_backend.py && echo "✓ No syntax errors"

      - name: Check seed script syntax
        run: python -m py_compile seed_database.py && echo "✓ No syntax errors"

  # ── Frontend: install & build ──────────────────────────────
  frontend:
    name: Frontend (React build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          REACT_APP_API_URL: http://localhost:5000/api
          CI: false        # treat warnings as warnings, not errors
        run: npm run build

      - name: Confirm build output exists
        run: test -d frontend/build && echo "✓ Build succeeded"
